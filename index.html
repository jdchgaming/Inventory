<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="color-scheme" content="light dark" />
<title>Gaming & Technology Inventory</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #ffffff;
    --pill-bg: #ffffff;
    --ink: #18201f;
    --mid: #5b6663;
    --line: #d8dedc;
    --hover: #f1f3f2;
    --tag: #18201f;
    --tag-text: #f4f6f5;
    --shadow: rgba(32, 33, 36, 0.28);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #191c1b;
      --pill-bg: #262a29;
      --ink: #f2f4f3;
      --mid: #b8c1be;
      --line: #565e5c;
      --hover: #323736;
      --tag: #262a29;
      --tag-text: #f2f4f3;
      --shadow: rgba(0, 0, 0, 0.5);
    }
  }
  * { box-sizing: border-box; }
  html { color-scheme: light dark; background: var(--bg); }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: arial, sans-serif;
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .wrap {
    width: 100%;
    max-width: 584px;
    margin: 0 auto;
    padding: 20px;
  }
  .instruction {
    text-align: center;
    font-family: 'Inter', arial, sans-serif;
    font-size: 15px;
    font-weight: 400;
    letter-spacing: 0.01em;
    color: var(--mid);
    margin: 0 0 20px;
  }
  .search-area { position: relative; }
  .pill {
    display: flex;
    align-items: center;
    background: var(--pill-bg);
    border: 1px solid var(--line);
    border-radius: 24px;
    padding: 0 14px;
    height: 46px;
    transition: box-shadow 0.15s ease;
  }
  .pill:hover, .pill.raised {
    box-shadow: none;
  }
  .pill.open {
    border-radius: 24px 24px 0 0;
  }
  .pill svg { flex-shrink: 0; margin-right: 13px; color: var(--mid); }
  .pill input {
    flex: 1;
    font-size: 16px;
    border: none;
    background: transparent;
    color: var(--ink);
    font-family: arial, sans-serif;
    min-width: 0;
  }
  .pill input:focus { outline: none; }
  .clear-btn {
    border: none;
    background: transparent;
    cursor: pointer;
    padding: 8px;
    color: var(--mid);
    font-size: 18px;
    line-height: 1;
    display: none;
  }
  .dropdown {
    position: absolute;
    top: 100%;
    left: 0;
    right: 0;
    background: var(--pill-bg);
    border: 1px solid var(--line);
    border-top: none;
    border-radius: 0 0 24px 24px;
    overflow: hidden;
    box-shadow: 0 4px 6px var(--shadow);
    z-index: 10;
    padding-bottom: 8px;
    display: none;
  }
  .dropdown .divider {
    border-top: 1px solid var(--line);
    margin: 0 14px 6px;
  }
  .dropdown .fuzzy-label {
    padding: 4px 16px 6px;
    font-size: 13px;
    color: var(--mid);
  }
  .dropdown .empty {
    padding: 10px 16px 16px;
    font-size: 14px;
    color: var(--mid);
  }
  .suggestion {
    display: flex;
    justify-content: space-between;
    align-items: center;
    width: 100%;
    padding: 8px 16px;
    border: none;
    background: transparent;
    cursor: pointer;
    font-size: 16px;
    font-family: arial, sans-serif;
    color: var(--ink);
    text-align: left;
  }
  .suggestion.hl { background: var(--hover); }
  .suggestion .name-wrap {
    display: flex;
    align-items: center;
    min-width: 0;
  }
  .suggestion .name-wrap svg { flex-shrink: 0; margin-right: 14px; color: var(--mid); }
  .suggestion .name {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .suggestion .loc {
    font-size: 13px;
    color: var(--mid);
    flex-shrink: 0;
    margin-left: 16px;
  }
  .result { margin-top: 36px; display: none; }
  .result-card {
    background: var(--tag);
    color: var(--tag-text);
    border-radius: 24px;
    padding: 28px 28px 32px;
  }
  .result-item {
    font-size: 15px;
    opacity: 0.75;
    margin-bottom: 22px;
    text-align: center;
  }
  .result-cols {
    display: flex;
    gap: 56px;
    justify-content: center;
  }
  .result-col { text-align: center; }
  .result-label {
    font-size: 12px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    opacity: 0.6;
    margin-bottom: 6px;
  }
  .result-num {
    font-size: 56px;
    font-weight: 400;
    line-height: 1;
  }
  .again-wrap { text-align: center; }
  .again {
    margin-top: 18px;
    padding: 9px 18px;
    font-size: 14px;
    font-family: arial, sans-serif;
    color: var(--ink);
    background: var(--hover);
    border: 1px solid transparent;
    border-radius: 4px;
    cursor: pointer;
  }
  .status {
    text-align: center;
    font-size: 13px;
    color: var(--mid);
    margin-top: 40px;
  }
  @media (prefers-reduced-motion: reduce) {
    * { transition: none !important; }
  }
</style>
</head>
<body>
<div class="wrap">
  <p class="instruction">Search for gaming &amp; technology items</p>

  <div class="search-area">
    <div class="pill" id="pill">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <circle cx="11" cy="11" r="7"></circle>
        <line x1="16.5" y1="16.5" x2="21" y2="21"></line>
      </svg>
      <input id="search" type="text" autocomplete="off" aria-label="Search for an item" autofocus />
      <button class="clear-btn" id="clear" aria-label="Clear search">&#10005;</button>
    </div>
    <div class="dropdown" id="dropdown"></div>
  </div>

  <div class="result" id="result">
    <div class="result-card">
      <div class="result-item" id="result-item"></div>
      <div class="result-cols">
        <div class="result-col">
          <div class="result-label">Cabinet</div>
          <div class="result-num" id="result-cabinet"></div>
        </div>
        <div class="result-col">
          <div class="result-label">Shelf</div>
          <div class="result-num" id="result-shelf"></div>
        </div>
      </div>
    </div>
    <div class="again-wrap">
      <button class="again" id="again">Search again</button>
    </div>
  </div>

  <div class="status" id="status"></div>
</div>

<script>
/* ============================================================
   PASTE YOUR PUBLISHED GOOGLE SHEET CSV LINK BETWEEN THE QUOTES
   (File > Share > Publish to web > select sheet > CSV)
   Leave empty ("") to use the built-in sample data.
   ============================================================ */
const SHEET_CSV_URL = "";

/* Sample data used when no sheet link is set */
const SAMPLE = [
  ["Nintendo Switch console", 1, 1],
  ["Switch Joy-Con controllers", 1, 2],
  ["Switch Pro Controller", 1, 2],
  ["Switch charging dock", 1, 3],
  ["Switch game cartridges", 1, 4],
  ["PS5 console", 2, 1],
  ["PS5 DualSense controllers", 2, 2],
  ["PS5 controller charging station", 2, 2],
  ["PS5 game discs", 2, 3],
  ["Xbox Series X console", 2, 4],
  ["Xbox controllers", 2, 5],
  ["Xbox game discs", 2, 5],
  ["Meta Quest 3 headset", 3, 1],
  ["VR controllers", 3, 1],
  ["VR headset sanitizing wipes", 3, 2],
  ["VR silicone face covers", 3, 2],
  ["iPads", 3, 3],
  ["iPad cases", 3, 3],
  ["iPad chargers", 3, 4],
  ["Stylus pens", 3, 4],
  ["HDMI cables", 4, 1],
  ["USB-C cables", 4, 1],
  ["USB-A cables", 4, 1],
  ["Power strips", 4, 2],
  ["Extension cords", 4, 2],
  ["AA batteries", 4, 3],
  ["AAA batteries", 4, 3],
  ["Battery chargers", 4, 3],
  ["Portable projectors", 4, 4],
  ["Projector screens", 4, 5],
  ["Wired headphones", 5, 1],
  ["Bluetooth headphones", 5, 1],
  ["Headphone covers", 5, 2],
  ["Bluetooth speakers", 5, 2],
  ["Gaming mice", 5, 3],
  ["Gaming keyboards", 5, 3],
  ["Mouse pads", 5, 4],
  ["Webcams", 5, 4],
  ["Microphones", 5, 5],
  ["Capture cards", 6, 1],
  ["Screen cleaning kits", 6, 2],
  ["Cable ties", 6, 3],
  ["Velcro straps", 6, 3],
  ["Adapters (HDMI to USB-C)", 6, 4],
  ["Surge protectors", 6, 5],
];

let INVENTORY = SAMPLE.map(function (r) {
  return { item: String(r[0]), cabinet: String(r[1]), shelf: String(r[2]) };
});

/* ---------- Minimal CSV parser (handles quoted fields) ---------- */
function parseCSV(text) {
  const rows = [];
  let row = [], field = "", inQuotes = false;
  for (let i = 0; i < text.length; i++) {
    const c = text[i];
    if (inQuotes) {
      if (c === '"') {
        if (text[i + 1] === '"') { field += '"'; i++; }
        else inQuotes = false;
      } else field += c;
    } else {
      if (c === '"') inQuotes = true;
      else if (c === ",") { row.push(field); field = ""; }
      else if (c === "\n" || c === "\r") {
        if (c === "\r" && text[i + 1] === "\n") i++;
        row.push(field); field = "";
        if (row.some(function (f) { return f.trim() !== ""; })) rows.push(row);
        row = [];
      } else field += c;
    }
  }
  row.push(field);
  if (row.some(function (f) { return f.trim() !== ""; })) rows.push(row);
  return rows;
}

function loadSheet() {
  if (!SHEET_CSV_URL) return;
  fetch(SHEET_CSV_URL)
    .then(function (r) {
      if (!r.ok) throw new Error("HTTP " + r.status);
      return r.text();
    })
    .then(function (text) {
      const rows = parseCSV(text);
      if (rows.length < 2) throw new Error("Sheet is empty");
      /* Skip header row; expect columns: Item, Cabinet, Shelf */
      const data = rows.slice(1)
        .filter(function (r) { return r[0] && r[0].trim(); })
        .map(function (r) {
          return {
            item: r[0].trim(),
            cabinet: (r[1] || "").trim(),
            shelf: (r[2] || "").trim(),
          };
        });
      if (data.length) {
        INVENTORY = data;
        setStatus("");
      }
    })
    .catch(function (err) {
      console.error("Could not load sheet:", err);
      setStatus("Live inventory unavailable — showing built-in list.");
    });
}

function setStatus(msg) {
  document.getElementById("status").textContent = msg;
}

/* ---------- Fuzzy matching ---------- */
function levenshtein(a, b) {
  const m = a.length, n = b.length;
  if (!m) return n;
  if (!n) return m;
  let prev = [];
  for (let i = 0; i <= n; i++) prev.push(i);
  for (let i = 1; i <= m; i++) {
    const curr = [i];
    for (let j = 1; j <= n; j++) {
      curr[j] = Math.min(
        prev[j] + 1,
        curr[j - 1] + 1,
        prev[j - 1] + (a[i - 1] === b[j - 1] ? 0 : 1)
      );
    }
    prev = curr;
  }
  return prev[n];
}

function scoreItem(query, item) {
  const q = query.toLowerCase().trim();
  const t = item.toLowerCase();
  if (!q) return null;
  if (t.indexOf(q) === 0) return { rank: 0, d: 0 };
  if (t.indexOf(q) !== -1) return { rank: 1, d: 0 };
  const wordsArr = t.split(/\s+/);
  for (let i = 0; i < wordsArr.length; i++) {
    if (wordsArr[i].indexOf(q) === 0) return { rank: 1, d: 0 };
  }
  const words = wordsArr.concat(t);
  let best = Infinity;
  for (let i = 0; i < words.length; i++) {
    const w = words[i];
    const d = levenshtein(q, w.slice(0, Math.max(q.length, w.length)));
    if (d < best) best = d;
  }
  const tolerance = q.length <= 4 ? 1 : q.length <= 7 ? 2 : 3;
  if (best <= tolerance) return { rank: 2, d: best };
  return null;
}

function getSuggestions(query) {
  const results = [];
  for (let i = 0; i < INVENTORY.length; i++) {
    const s = scoreItem(query, INVENTORY[i].item);
    if (s) results.push({ item: INVENTORY[i], rank: s.rank, d: s.d });
  }
  results.sort(function (a, b) {
    return a.rank - b.rank || a.d - b.d || a.item.item.localeCompare(b.item.item);
  });
  return results.slice(0, 7);
}

/* ---------- UI wiring ---------- */
const pill = document.getElementById("pill");
const input = document.getElementById("search");
const clearBtn = document.getElementById("clear");
const dropdown = document.getElementById("dropdown");
const resultEl = document.getElementById("result");
const againBtn = document.getElementById("again");

let suggestions = [];
let highlight = 0;
let selected = null;

const SEARCH_ICON = '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"></circle><line x1="16.5" y1="16.5" x2="21" y2="21"></line></svg>';

function render() {
  const q = input.value.trim();
  clearBtn.style.display = input.value ? "block" : "none";

  if (!q || selected) {
    dropdown.style.display = "none";
    pill.classList.remove("open", "raised");
    return;
  }

  suggestions = getSuggestions(q);
  const isFuzzy = suggestions.length > 0 && suggestions[0].rank === 2;

  let html = '<div class="divider"></div>';
  if (suggestions.length === 0) {
    html += '<div class="empty">No matching items. Check the spelling or try another word.</div>';
  } else {
    if (isFuzzy) html += '<div class="fuzzy-label">Did you mean:</div>';
    for (let i = 0; i < suggestions.length; i++) {
      const s = suggestions[i].item;
      html +=
        '<button class="suggestion' + (i === highlight ? " hl" : "") + '" data-i="' + i + '">' +
        '<span class="name-wrap">' + SEARCH_ICON +
        '<span class="name">' + escapeHTML(s.item) + "</span></span>" +
        '<span class="loc">Cabinet ' + escapeHTML(s.cabinet) + " &middot; Shelf " + escapeHTML(s.shelf) + "</span>" +
        "</button>";
    }
  }
  dropdown.innerHTML = html;
  dropdown.style.display = "block";
  pill.classList.add("open", "raised");

  const btns = dropdown.querySelectorAll(".suggestion");
  btns.forEach(function (btn) {
    btn.addEventListener("click", function () {
      choose(suggestions[parseInt(btn.dataset.i, 10)].item);
    });
    btn.addEventListener("mouseenter", function () {
      highlight = parseInt(btn.dataset.i, 10);
      updateHighlight();
    });
  });
}

function updateHighlight() {
  const btns = dropdown.querySelectorAll(".suggestion");
  btns.forEach(function (btn, i) {
    btn.classList.toggle("hl", i === highlight);
  });
}

function escapeHTML(s) {
  return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
}

function choose(row) {
  selected = row;
  input.value = row.item;
  document.getElementById("result-item").textContent = row.item;
  document.getElementById("result-cabinet").textContent = row.cabinet;
  document.getElementById("result-shelf").textContent = row.shelf;
  resultEl.style.display = "block";
  render();
}

function reset() {
  selected = null;
  input.value = "";
  resultEl.style.display = "none";
  highlight = 0;
  render();
  input.focus();
}

input.addEventListener("input", function () {
  selected = null;
  resultEl.style.display = "none";
  highlight = 0;
  render();
});

input.addEventListener("keydown", function (e) {
  const openList = dropdown.style.display === "block" && suggestions.length > 0;
  if (e.key === "ArrowDown" && openList) {
    e.preventDefault();
    highlight = (highlight + 1) % suggestions.length;
    updateHighlight();
  } else if (e.key === "ArrowUp" && openList) {
    e.preventDefault();
    highlight = (highlight - 1 + suggestions.length) % suggestions.length;
    updateHighlight();
  } else if (e.key === "Enter" && suggestions.length > 0 && !selected) {
    e.preventDefault();
    choose(suggestions[openList ? highlight : 0].item);
  } else if (e.key === "Escape") {
    dropdown.style.display = "none";
    pill.classList.remove("open");
  }
});

clearBtn.addEventListener("click", reset);
againBtn.addEventListener("click", reset);

document.addEventListener("click", function (e) {
  if (!e.target.closest(".search-area")) {
    dropdown.style.display = "none";
    pill.classList.remove("open");
  }
});

loadSheet();
render();
</script>
</body>
</html>
